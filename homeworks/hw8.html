<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Display Property</title>
  <link rel="stylesheet" href="hw8.css">
</head>

<body>
  <!-- 8A -->
  <input type="text" placeholder="Name" class="input-name">
  <input type="text" placeholder="Email" class="input-email">
  <hr>
  <!-- 8B -->
  <p class="question">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
  <button>Yes</button>
  <button>No</button>
  <hr>
  <!-- 8C -->
  <a href="https://www.google.com/webhp""><img class="logo" src="google-logo.png" alt="Google Logo"></a>
  <input class="search-bar" type="text" placeholder="Search Google or type a URL">
  <hr>
  <!-- 8D -->
  <input type="text" placeholder="First name" class="first-name">
  <input type="text" placeholder="Last name" class="last-name">
  <input type="text" placeholder="Email" class="email">
  <button class="sign-up">Sign Up</button>
  <hr>
  <!-- 8E -->
  <p class="instruction">Request a ride now</p>
  <input class="pickup" type="text" placeholder="Enter pickup location">
  <input class="destination" type="text" placeholder="Enter destination">
  <button class="request">Request now</button>
  <button class="schedule">Schedule for later</button>
</body>

</html>
