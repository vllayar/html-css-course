<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The &lt;div&gt; element</title>
  <link rel="stylesheet" href="hw9.css">
</head>

<body>
  <!-- 9A -->
  <div class="red-block"></div>
  <hr>
  <!-- 9B -->
  <div class="green-circle"></div>
  <hr>
  <!-- 9C -->
  <div class="feedback">
    <p class="question">Satisfied with our service?</p>
    <button class="yes-button">Yes</button>
    <button class="no-button">No</button>
  </div>
  <hr>
  <!-- 9D -->
  <div class="youtube-music">
    <p class="heading">Install YouTube Music</p>
    <p class="subheading">Add YouTube Music to your desktop for quick and easy access</p>
  </div>
  <hr>
  <!-- 9E -->
  <div class="twitter">
    <img class="profile-pic-twitter" src="white-puppy.jpeg" alt="white puppy">
    <input class="post" type="text" placeholder="What's happening?">
    <button class="tweet">Tweet</button>
  </div>
  <hr>
  <!-- 9F -->
  <div class="friend-suggestion">
    <img class="profile-pic" src="white-puppy.jpeg" alt="white puppy">
    <p class="username">Oliver</p>
    <p class="mutual-friends-number">2 mutual friends</p>
    <button class="add-friend">Add Friend</button>
  </div>
  <hr>
  <!-- 9G -->
  <div class="friend-suggestion">
    <img class="profile-pic-1" src="white-puppy.jpeg" alt="white puppy">
    <p class="username">Oliver</p>
    <p class="mutual-friends-number">2 mutual friends</p>
    <button class="add-friend">Add Friend</button>
  </div>
  <div class="friend-suggestion">
    <img class="profile-pic-2" src="white-rabbit.jpeg" alt="white puppy">
    <p class="username">Mimi</p>
    <p class="mutual-friends-number">3 mutual friends</p>
    <button class="add-friend">Add Friend</button>
  </div>
  <div class="friend-suggestion">
    <img class="profile-pic-3" src="orange-cat.jpg" alt="white puppy">
    <p class="username">Garfield</p>
    <p class="mutual-friends-number">4 mutual friends</p>
    <button class="add-friend">Add Friend</button>
  </div>
  <hr>
  <!-- 9H -->
  <div class="logo-block">
    <a href="https://www.google.com/webhp""><img class="logo" src="google-logo.png" alt="Google Logo"></a>
  </div>
  <div class="search-block">
    <input class="search-bar" type="text" placeholder="Search Google or type a URL">
  </div>
  <div class="google-buttons">
    <button class="search-button">Google Search</button>
    <button class="feeling-lucky-button">I'm Feeling Lucky</button>
  </div>
  <hr>
</body>

</html>
