<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Practice</title>
  <link rel="stylesheet" href="hw12.css">
</head>

<body>
  <!-- 12A -->
  <div class="a-container">
    <div class="a-box-1">200px</div>
    <div class="a-box-2">75px</div>
  </div>
  <hr>
  <!-- 12B -->
  <div class="b-container">
    <div class="b-box-1">item1</div>
    <div class="b-box-2">item2</div>
    <div class="b-box-3">item3</div>
  </div>
  <hr>
  <!-- 12C -->
  <div class="c-container">
    <div class="c-box">item1</div>
    <div class="c-box">item2</div>
    <div class="c-box">item3</div>
    <div class="c-box">item4</div>
  </div>
  <hr>
  <!-- 12D -->
  <div class="d-container">
    <div class="d-box">item1</div>
    <div class="d-box">item2</div>
  </div>
  <hr>
  <!-- 12E -->
  <div class="e-container">
    <div class="e-tabs">
      <div>Home</div>
      <div class="e-counter">14</div>
    </div>
    <div class="e-tabs">
      <div>Notifications</div>
      <div class="e-counter">3</div>
    </div>
    <div class="e-tabs">
      <div>Messages</div>
      <div class="e-counter">5</div>
    </div>
  </div>
  <hr>
  <!-- 12F -->
  <div class="f-header">
    <div class="f-home">Home</div>
    <input class="f-search-bar" type="text" placeholder="Search">
    <button class="f-download-button">Download</button>
  </div>
  <hr>
  <!-- 12G -->
  <div class="friends-suggestion">
    <div class="account">
      <img class="profile-pic" src="white-puppy.jpeg">
      <div class="account-info">
        <p class="username">oliver</p>
        <p class="bio">the dog</p>
        <p class="status">Popular</p>
      </div>
      <button class="follow">Follow</button>
    </div>
    <div class="account">
      <img class="profile-pic" src="orange-cat.jpg">
      <div class="account-info">
        <p class="username">Garfield</p>
        <p class="bio">the one and only</p>
        <p class="status">Popular</p>
      </div>
      <button class="follow">Follow</button>
    </div>
    <div class="account">
      <img class="profile-pic" src="white-rabbit.jpeg">
      <div class="account-info">
        <p class="username">Rab</p>
        <p class="bio">fastest boi</p>
        <p class="status">Popular</p>
      </div>
      <button class="follow">Follow</button>
    </div>
  </div>
</body>

</html>
