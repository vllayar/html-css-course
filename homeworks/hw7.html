<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Images and Text Boxes</title>
  <link rel="stylesheet" href="hw7.css">
</head>

<body>
<!-- 7A -->
<img class="round-corner" src="Image 236x213.jpeg" alt="white puppy"">
<hr>
<!-- 7B -->
<img class="square" src="Image 236x213.jpeg" alt="white puppy">
<hr>
<!-- 7C -->
<img class="round" src="Image 236x213.jpeg" alt="white puppy">
<hr>
<!-- 7D -->
<input class="search" type="text" placeholder="Search">
<hr>
<!-- 7E -->
<input class="google-search" type="text" placeholder="Search Google or type a URL">
<hr>
<!-- 7F -->
<p style="color: rgba(0, 0, 0, 0.5); margin-bottom: 4px;">Email</p>
<input class="email" type="text">
<p class="email-input">By clicking Agree & Join, you agree to the Privacy Policy.</p>
<button class="agree-join">Agree & Join</button>
<hr>
<!-- 7G -->
<img class="profile-pic" src="Image 236x213.jpeg" alt="white puppy">
<input class="post" type="text" placeholder="What's happening?">
<button class="tweet">Tweet</button>
</body>

</html>
