<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid</title>
  <link rel="stylesheet" href="hw11.css">
</head>

<body>
  <!-- 11A -->
  <div class="grid-11a">
    <div style="background-color: lightblue;">200px</div>
    <div style="background-color: lightpink;">75px</div>
  </div>
  <hr>
  <!-- 11B -->
  <div class="grid-11b">
    <div style="background-color: lightblue;">col1</div>
    <div style="background-color: lightpink;">col2</div>
    <div style="background-color: lightblue;">col3</div>
  </div>
  <hr>
  <!-- 11C -->
  <div class="grid-11c">
    <div style="background-color: lightpink;">col1</div>
    <div style="background-color: lightpink;">col2</div>
    <div style="background-color: lightpink;">col3</div>
    <div style="background-color: lightpink;">col4</div>
    <div style="background-color: lightpink;">col1</div>
    <div style="background-color: lightpink;">col2</div>
    <div style="background-color: lightpink;">col3</div>
    <div style="background-color: lightpink;">col4</div>
  </div>
  <hr>
  <!-- 11D -->
  <div class="hw-11d">
    <div class="friend-suggestion">
      <img class="profile-pic" src="white-puppy.jpeg" alt="white puppy">
      <p class="username">Oliver</p>
      <div class="mutual-friend">
        <img class="mutual-friend-profile-pic" src="../channel-pictures/channel-picture-2.jpeg" alt="">
        <p class="mutual-friends-number">2 mutual friends</p>
      </div>
      <button class="add-friend">Add Friend</button>
    </div>
    <div class="friend-suggestion">
      <img class="profile-pic" src="white-rabbit.jpeg" alt="white puppy">
      <p class="username">Mimi</p>
      <div class="mutual-friend">
        <img class="mutual-friend-profile-pic" src="../channel-pictures/channel-picture-2.jpeg" alt="">
        <p class="mutual-friends-number">2 mutual friends</p>
      </div>
      <button class="add-friend">Add Friend</button>
    </div>
    <div class="friend-suggestion">
      <img class="profile-pic" src="orange-cat.jpg" alt="white puppy">
      <p class="username">Garfield</p>
      <div class="mutual-friend">
        <img class="mutual-friend-profile-pic" src="../channel-pictures/channel-picture-2.jpeg" alt="">
        <p class="mutual-friends-number">2 mutual friends</p>
      </div>
      <button class="add-friend">Add Friend</button>
    </div>
  </div>
</body>

</html>
